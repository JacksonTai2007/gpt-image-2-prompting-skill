name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No unfilled placeholders
        run: |
          if grep -RIno --exclude-dir=.git --exclude-dir=.github -e '<Your Name>' -e 'github.com/<' .; then
            echo "::error::Unfilled placeholder found"
            exit 1
          fi
          echo "OK: no placeholders"

      - name: Recipe count is consistent
        run: |
          file=gpt-image-2-prompting/references/scene-cookbook.md
          n=$(grep -cE '^### [0-9]+\.' "$file")
          echo "scene-cookbook.md defines $n recipes"
          nums=$(grep -rhoE '[0-9]+ optimized, ready-to-run' --include=*.md . | grep -oE '^[0-9]+' | sort -u || true)
          for v in $nums; do
            if [ "$v" != "$n" ]; then
              echo "::error::recipe-count drift: found $v but scene-cookbook.md has $n"
              exit 1
            fi
          done
          for f in README.md README_zh.md; do
            if ! grep -q "$n" "$f"; then
              echo "::error::$f should mention recipe count $n"
              exit 1
            fi
          done
          echo "OK: recipe count $n is consistent"

      - name: SKILL.md frontmatter has name, description, version
        run: |
          file=gpt-image-2-prompting/SKILL.md
          for k in name description version; do
            if ! grep -qE "^$k:" "$file"; then
              echo "::error::SKILL.md frontmatter missing $k"
              exit 1
            fi
          done
          echo "OK: frontmatter has name, description, version"

      - name: Skill bundle is present
        run: test -f dist/gpt-image-2-prompting.skill && echo "OK: bundle present"
